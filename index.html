<title>DTG Cost Lab</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Avenir','Montserrat',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#0D1117;color:#E6EDF3;-webkit-font-smoothing:antialiased;padding-bottom:76px}
.card{background:rgba(255,255,255,.05);border-radius:16px;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:18px;margin-bottom:14px}
h2{font-size:22px;font-weight:800;letter-spacing:-.3px;margin:0 0 14px;color:#fff}
.lb{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=number],select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);font-size:16px;color:#E6EDF3;font-family:inherit;outline:none}
input:focus,select:focus{border-color:#6C5CE7;box-shadow:0 0 0 3px rgba(108,92,231,.2)}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;margin:10px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6C5CE7,#A855F7);box-shadow:0 2px 8px rgba(108,92,231,.4)}
.btn{display:inline-block;padding:12px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,#6C5CE7,#A855F7);color:#fff;font-size:15px;font-weight:700;font-family:inherit;text-align:center;min-height:44px;cursor:pointer;letter-spacing:.2px}
.btn:active{opacity:.85;transform:scale(.97)}
.pill{display:inline-block;padding:8px 18px;border-radius:24px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:13px;font-weight:700;font-family:inherit;min-height:36px;cursor:pointer;letter-spacing:.3px}
.pill.on{background:linear-gradient(135deg,#6C5CE7,#A855F7);color:#fff;border-color:transparent}
.tier{display:inline-block;padding:9px 18px;border-radius:24px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:13px;font-weight:700;font-family:SFMono-Regular,ui-monospace,Menlo,monospace;cursor:pointer}
.tier.on{background:#6C5CE7;color:#fff;border-color:#6C5CE7}
.tc{padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);cursor:pointer;text-align:left;min-height:44px;transition:all .2s}
.tc.on{border-color:rgba(108,92,231,.5);background:rgba(108,92,231,.1)}
.tag{font-size:9px;padding:3px 8px;border-radius:6px;font-weight:700;display:inline-block;letter-spacing:.5px}
.mono{font-family:SFMono-Regular,ui-monospace,Menlo,monospace;font-size:12px;font-weight:600}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.pbar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:2px;transition:width .4s}
.cbar{display:flex;height:10px;border-radius:5px;overflow:hidden;background:rgba(255,255,255,.06)}
.cbar>div{transition:flex .4s;min-width:1px}
header{background:rgba(13,17,23,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.price-strip{background:rgba(13,17,23,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:50px;z-index:9}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(13,17,23,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px))}
.tab-bar button{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;color:rgba(255,255,255,.3);font-size:10px;font-weight:600;font-family:inherit;padding:4px 6px;cursor:pointer;min-width:50px;letter-spacing:.3px}
.tab-bar button.on{color:#A855F7}
.tab-bar button svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.content{max-width:540px;margin:0 auto;padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.uz{border:2px dashed rgba(255,255,255,.1);border-radius:14px;padding:24px;text-align:center;margin-bottom:12px;transition:border-color .2s}
.ci{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);cursor:pointer;width:100%;text-align:left;transition:all .15s;min-height:44px;margin-bottom:8px}
.ci.on{border-color:rgba(108,92,231,.5);background:rgba(108,92,231,.08)}
.sim{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sim>div{padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.abar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;flex:1}
.afill{height:100%;border-radius:2px;transition:width .4s}
::selection{background:rgba(108,92,231,.3)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
</style>
</head>

// Convert AW to catalog format, merge with saved prices from localStorage
function loadCatalog(){
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('dtg_prices') || '{}'); } catch(e){}
  var cat = [];
  for(var i=0;i<AW.length;i++){
    var a=AW[i], sku=a[0], sp=saved[sku]||{};
    cat.push({id:sku.toLowerCase().replace(/ /g,'_').replace(/\//g,'_'),
      sku:sku, name:a[1], sec:a[2], sub:a[3], weight:a[4], sizes:a[5],
      nColors:a[6], type:a[7], gen:a[8], colorsPreview:a[9],
      src:'Action Wear',
      color: sp.color||'', disc:sp.disc||0, discType:sp.discType||'%',
      p:sp.p||{"1+":0,"10+":0,"50+":0,"500+":0}
    });
  }
  // Add custom items from localStorage
  try {
    var custom = JSON.parse(localStorage.getItem('dtg_custom') || '[]');
    cat = cat.concat(custom);
  } catch(e){}
  return cat;
}
function savePrices(){
  var saved = {};
  S.cat.forEach(function(c){
    if(c.sku && (c.p["1+"]>0||c.p["10+"]>0||c.disc>0||c.color)){
      saved[c.sku]={p:c.p, disc:c.disc, discType:c.discType, color:c.color};
    }
  });
  try{localStorage.setItem('dtg_prices',JSON.stringify(saved))}catch(e){}
  // Save custom items (non-AW)
  var custom = S.cat.filter(function(c){return !c.sku || c.src!=='Action Wear'});
  try{localStorage.setItem('dtg_custom',JSON.stringify(custom))}catch(e){}
}

function fml(n){return(n||0).toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2})}
function pn(s){return typeof s==="number"?s:parseFloat(String(s).replace(/[€\s]/g,"").replace(",","."))||0}
function uid(){return Math.random().toString(36).slice(2,9)}

function getType(){return S.mode==="dtf"?FT.find(function(f){return f.id===S.ft})||FT[0]:TT.find(function(t){return t.id===S.tt})||TT[0]}
function getQual(){return QL.find(function(q){return q.id===S.qi})||QL[2]}

function analyzeImg(d,w,h){var co=0,cS=0,mS=0,yS=0,kS=0,tr=0,tot=w*h;for(var i=0;i<d.length;i+=4){var r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];if(a<30){tr++;continue}if(r>240&&g>240&&b>240)continue;co++;var rf=r/255,gf=g/255,bf=b/255,k=1-Math.max(rf,gf,bf);if(k>=1){kS++;continue}cS+=(1-rf-k)/(1-k);mS+=(1-gf-k)/(1-k);yS+=(1-bf-k)/(1-k);kS+=k}var ef=tot-tr;return{cv:ef>0?co/ef:0,aC:co>0?cS/co:0,aM:co>0?mS/co:0,aY:co>0?yS/co:0,aK:co>0?kS/co:0,dn:co>0?(cS+mS+yS+kS)/(co*4):0,ef:ef,tot:tot}}

function calcInk(an,wC,hC,qF,tT,iD){if(!an)return{c:0,m:0,y:0,k:0,w:0,t:0};var ar=wC*hC,d=1+(iD/100),cv=an.cv;var c=0,m=0,y=0,k=0,w=0;if(tT.uC){c=ar*cv*an.aC*.008*qF*d;m=ar*cv*an.aM*.008*qF*d;y=ar*cv*an.aY*.008*qF*d;k=tT.gB?0:ar*cv*an.aK*.008*qF*d}if(tT.uW){w=ar*(an.ef/an.tot)*.004*qF*d}return{c:c,m:m,y:y,k:k,w:w,t:c+m+y+k+w}}

function handleImg(file,side){if(!file||file.type.indexOf("image")<0)return;var url=URL.createObjectURL(file);var img=new Image();img.onload=function(){var cv=document.getElementById("cvs"),ctx=cv.getContext("2d",{willReadFrequently:true});var sc=Math.min(400/img.width,400/img.height,1);cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);ctx.drawImage(img,0,0,cv.width,cv.height);var an=analyzeImg(ctx.getImageData(0,0,cv.width,cv.height).data,cv.width,cv.height);if(side==="fr"){S.frAn=an;S.frUrl=url;S.frFn=file.name}else{S.bkAn=an;S.bkUrl=url;S.bkFn=file.name}render()};img.src=url}

function calc(){var aT=getType(),q=getQual();var item=S.cat[S.sC];var rawP=S.useCust?pn(S.custP):(item?item.p[S.sT]||0:0);var gC=rawP;if(!S.useCust&&item&&item.disc>0){if(item.discType==="%")gC=rawP*(1-item.disc/100);else gC=Math.max(0,rawP-item.disc)}var fI=calcInk(S.frAn,S.frPw,S.frPh,q.f,aT,S.iD);var bI=S.bkEn?calcInk(S.bkAn,S.bkPw,S.bkPh,q.f,aT,S.iD):{c:0,m:0,y:0,k:0,w:0,t:0};var tI={c:fI.c+bI.c,m:fI.m+bI.m,y:fI.y+bI.y,k:fI.k+bI.k,w:fI.w+bI.w,t:fI.t+bI.t};var inkCost=0;S.inks.forEach(function(ink){var ml=tI[ink.id==="cyan"?"c":ink.id==="magenta"?"m":ink.id==="yellow"?"y":ink.id==="black"?"k":"w"];inkCost+=(ink.pr/ink.ml)*ml});var aCo=S.cons.filter(function(c){if(c.dtf&&S.mode!=="dtf")return false;if(c.dk&&!aT.uW)return false;return true});var consCost=0;aCo.forEach(function(c){consCost+=(c.pr/(c.qty||1))*c.per});if(S.bkEn&&S.mode==="dtf"){var sh=S.cons.find(function(c){return c.id==="dtf_sheet"});if(sh)consCost+=(sh.pr/(sh.qty||1))*sh.per}var rP=250/(S.mP||1);var tC=gC+inkCost+consCost+rP+S.el+S.pk;var pN=tC>0?tC/(1-S.mg/100):0;var pV=pN*(1+S.vt/100);var pr=pN-tC;return{gC:gC,inkCost:inkCost,consCost:consCost,rP:rP,tC:tC,pN:pN,pV:pV,pr:pr,tI:tI,aCo:aCo,aT:aT,q:q}}


function filteredCat(){
  var q=(S.catQ||'').toLowerCase();
  var sec=S.catSec||'';
  return S.cat.filter(function(g,i){
    if(sec && g.sec!==sec) return false;
    if(!q) return true;
    return (g.sku||'').toLowerCase().indexOf(q)>=0 || 
           (g.name||'').toLowerCase().indexOf(q)>=0 || 
           (g.sec||'').toLowerCase().indexOf(q)>=0 ||
           (g.sub||'').toLowerCase().indexOf(q)>=0 ||
           (g.weight||'').toLowerCase().indexOf(q)>=0;
  }).slice(0,50);
}

      h+='<div class="card" style="border:1px solid rgba(108,92,231,.3);margin-top:10px">';
      h+='<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Nuovo articolo personalizzato</div>';
      h+='<div style="margin-bottom:8px"><label class="lb">Nome *</label><input id="newName" placeholder="Es. Capo custom"></div>';
      h+='<div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1"><label class="lb">Colore</label><input id="newColor" placeholder="Bianco"></div><div style="flex:1"><label class="lb">Taglie</label><input id="newSizes" placeholder="S-XXL"></div></div>';
      h+='<label class="lb">Tipo</label><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px" id="newTypeWrap">';
      GTYPES.forEach(function(gt,ti){h+='<button style="display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;border:1px solid '+(ti===0?'rgba(108,92,231,.5)':'rgba(255,255,255,.08)')+';background:'+(ti===0?'rgba(108,92,231,.15)':'rgba(255,255,255,.03)')+';color:'+(ti===0?'#A855F7':'rgba(255,255,255,.4)')+';font-size:11px;font-weight:600;cursor:pointer;font-family:inherit" data-type="'+gt.id+'" onclick="selNewType(this,\''+gt.id+'\')">'+gIco(gt.id,16)+gt.n+'</button>'});
      h+='</div>';
      h+='<label class="lb">Prezzi</label><div class="g2" style="margin-bottom:8px">';
      TIERS.forEach(function(t){h+='<div><label class="lb" style="font-size:10px">€ '+t+'</label><input type="number" step="0.01" id="newP'+t.replace("+","")+'" placeholder="0,00"></div>'});
      h+='</div>';
      h+='<div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="catAddSave()">Aggiungi</button><button style="flex:0;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px" onclick="S.catAdd=false;render()">Annulla</button></div>';
      h+='</div>';
    } else {
      h+='<div style="display:flex;gap:8px;margin-top:10px"><button class="btn" style="flex:1" onclick="S.catAdd=true;render()">+ Aggiungi articolo custom</button></div>';
    }

    // Manual price
    h+='<div class="card" style="margin-top:10px"><span style="font-size:11px;color:rgba(255,255,255,.3);display:block;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Prezzo manuale rapido</span><div style="display:flex;gap:8px"><input style="flex:2" value="'+S.custN+'" onchange="S.custN=this.value;S.useCust=true;render()" placeholder="Nome"><input type="number" step="0.01" style="flex:1" value="'+(S.custP||"")+'" onchange="S.custP=this.value;S.useCust=true;render()" placeholder="€"></div></div>';
    h+='<div style="padding:14px;border-radius:12px;background:rgba(108,92,231,.1);border:1px solid rgba(108,92,231,.2);font-size:14px;font-weight:600;color:#A855F7;margin-top:10px">→ '+gN+' — '+fmt(r.gC)+'</div>';
  }

  else if(S.tab==="costs"){
    h+='<h2>Costi fissi</h2><div class="card" style="text-align:center"><span style="font-size:36px">🏦</span><div style="font-size:16px;font-weight:800;margin-top:8px;color:#fff">Rata stampante</div><div style="font-size:12px;color:rgba(255,255,255,.3);margin-top:2px">€250/mese</div><label class="lb" style="margin-top:12px">Produzione mensile</label><input type="range" min="10" max="500" step="5" value="'+S.mP+'" oninput="S.mP=parseInt(this.value);render()"><div class="mono" style="font-size:20px;color:#fff;margin-top:4px">'+S.mP+' pz</div><div class="mono" style="color:#A855F7;font-size:15px;margin-top:4px">'+fmt4(r.rP)+'/maglia</div></div>';
    h+='<div class="g2"><div class="card" style="text-align:center"><span style="font-size:30px">⚡</span><div style="font-size:14px;font-weight:700;margin:6px 0;color:#fff">Corrente</div><input type="number" step="0.01" value="'+S.el+'" onchange="S.el=parseFloat(this.value)||0;render()" style="text-align:center;font-size:22px;font-weight:800"></div><div class="card" style="text-align:center"><span style="font-size:30px">📦</span><div style="font-size:14px;font-weight:700;margin:6px 0;color:#fff">Imballo</div><input type="number" step="0.01" value="'+S.pk+'" onchange="S.pk=parseFloat(this.value)||0;render()" style="text-align:center;font-size:22px;font-weight:800"></div></div>';
    h+='<div class="card"><div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Consumabili</div>';
    r.aCo.forEach(function(c){var cost=(c.pr/(c.qty||1))*c.per;h+='<div style="padding:14px;border-radius:12px;background:rgba(255,255,255,.02);margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:14px;font-weight:700;color:#fff">'+c.n+'</div><div style="font-family:SFMono-Regular,monospace;font-size:16px;font-weight:800;color:#A855F7">'+fmt4(cost)+'</div></div><div class="g2"><div><label class="lb">Qtà</label><input type="number" value="'+c.qty+'" onchange="updCon(\''+c.id+'\',\'qty\',this.value)"></div><div><label class="lb">€ conf.</label><input type="number" step="0.01" value="'+c.pr+'" onchange="updCon(\''+c.id+'\',\'pr\',this.value)"></div></div><div style="margin-top:8px"><label class="lb">'+c.u+'/stampa</label><input type="number" step="0.1" value="'+c.per+'" onchange="updCon(\''+c.id+'\',\'per\',this.value)"></div></div>'});
    h+='<div style="display:flex;justify-content:space-between;padding:12px 16px;border-radius:12px;background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.15);font-size:13px;font-weight:700;color:#A855F7">Totale <span class="mono" style="font-size:14px">'+fmt4(r.consCost)+'</span></div></div>';
    h+='<div class="card"><div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Cartucce ink (800ml)</div>';
    S.inks.forEach(function(ink){h+='<div style="display:flex;align-items:center;gap:12px;padding:8px 0"><span class="dot" style="width:12px;height:12px;border-radius:6px;background:'+ink.c+'"></span><span style="flex:1;font-size:14px;font-weight:600;color:rgba(255,255,255,.7)">'+ink.n+'</span><input type="number" style="width:110px" value="'+ink.pr+'" onchange="updInk(\''+ink.id+'\',this.value)"></div>'});
    h+='</div>';
  }

  else if(S.tab==="pricing"){
    h+='<h2>Margine e IVA</h2><div class="card" style="padding:28px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:16px;font-weight:600;color:rgba(255,255,255,.6)">Margine</span><span style="font-size:40px;font-weight:900;color:#A855F7;font-family:SFMono-Regular,monospace">'+S.mg+'%</span></div><input type="range" min="10" max="80" value="'+S.mg+'" oninput="S.mg=parseInt(this.value);render()"><div style="margin-top:28px"><div style="font-size:16px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:12px">Aliquota IVA</div><div style="display:flex;gap:8px;flex-wrap:wrap">';
    ["4","10","22"].forEach(function(v){h+='<button class="tier'+(S.vt===parseInt(v)?' on':'')+'" style="font-size:17px;padding:14px 30px" onclick="S.vt='+v+';render()">'+v+'%</button>'});
    h+='</div></div></div>';
  }

  else if(S.tab==="result"){
    var bd=[{l:"Capo",v:r.gC,c:"#FF6B6B"},{l:"Inchiostri",v:r.inkCost,c:"#34AADC"},{l:"Consumabili",v:r.consCost,c:"#A855F7"},{l:"Rata",v:r.rP,c:"#F5A623"},{l:"Corrente",v:S.el,c:"#34D399"},{l:"Imballo",v:S.pk,c:"#8E8E93"}];
    h+='<h2>Risultato</h2><div class="card" style="border-radius:20px;padding:24px;border:1px solid rgba(108,92,231,.15);background:rgba(108,92,231,.03)">';
    h+='<div style="font-size:10px;font-weight:800;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px">Prezzo di vendita</div>';
    h+='<div style="font-size:12px;color:rgba(255,255,255,.3);margin-top:4px;line-height:1.5">'+gN+' · '+r.aT.n+(S.bkEn?' · Fronte+Retro':'')+'</div>';
    h+='<div style="font-size:48px;font-weight:900;text-align:center;padding:20px 0 6px;letter-spacing:-2px;color:#fff">'+fmt(r.pV)+'</div>';
    h+='<div style="text-align:center;font-size:13px;color:rgba(255,255,255,.3);margin-bottom:20px">IVA '+S.vt+'% inclusa · Netto '+fmt(r.pN)+'</div>';
    h+='<div style="height:1px;background:rgba(255,255,255,.06);margin:14px 0"></div>';
    h+='<div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.3);margin-bottom:10px">Costo: '+fmt(r.tC)+'</div>';
    bd.filter(function(b){return b.v>0}).forEach(function(b){var pct=r.tC>0?((b.v/r.tC)*100).toFixed(0):"0";h+='<div style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;font-size:13px"><span class="dot" style="background:'+b.c+'"></span><span style="flex:1;color:rgba(255,255,255,.5);font-weight:600">'+b.l+'</span><span class="mono" style="color:rgba(255,255,255,.6)">'+fmt4(b.v)+'</span><span class="mono" style="color:rgba(255,255,255,.25);width:36px;text-align:right;font-size:11px">'+pct+'%</span></div><div class="pbar"><div class="pfill" style="background:'+b.c+';width:'+pct+'%"></div></div></div>'});
    h+='<div style="height:1px;background:rgba(255,255,255,.06);margin:16px 0"></div>';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-radius:16px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.12)"><span style="font-size:15px;font-weight:600;color:rgba(255,255,255,.5)">💰 Guadagno</span><span style="font-family:SFMono-Regular,monospace;font-size:28px;font-weight:900;color:#34D399">'+fmt(r.pr)+'</span></div>';
    h+='<div style="height:1px;background:rgba(255,255,255,.06);margin:16px 0"></div>';
    h+='<div class="cbar"><div style="background:#FF6B6B;flex:'+r.tC+'"></div><div style="background:#34D399;flex:'+(r.pr>0?r.pr:0)+'"></div><div style="background:#F59E0B;flex:'+(r.pV-r.pN>0?r.pV-r.pN:0)+'"></div></div>';
    h+='<div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:rgba(255,255,255,.3)">';
    [["#FF6B6B","Costi"],["#34D399","Guadagno"],["#F59E0B","IVA"]].forEach(function(x){h+='<span><span class="dot" style="background:'+x[0]+';margin-right:5px;vertical-align:middle"></span>'+x[1]+'</span>'});
    h+='</div><div style="height:1px;background:rgba(255,255,255,.06);margin:16px 0"></div>';
    h+='<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Simulazione</div><div class="sim">';
    [10,50,100,S.mP].forEach(function(n){h+='<div><div style="font-size:12px;font-weight:800;color:rgba(255,255,255,.3)">'+n+' pz</div><div style="font-family:SFMono-Regular,monospace;font-size:20px;font-weight:800;color:#fff;margin-top:3px">'+fmt(r.pV*n)+'</div><div style="font-size:12px;color:#34D399;font-weight:700;margin-top:3px">+'+fmt(r.pr*n)+'</div></div>'});
    h+='</div></div>';
  }
  document.getElementById("content").innerHTML=h;
}

function go(t){S.tab=t;render();window.scrollTo(0,0)}
function setMode(m){S.mode=m;render()}
function setType(id){if(S.mode==="dtg")S.tt=id;else S.ft=id;render()}
function setQual(id){S.qi=id;render()}
function updInk(id,v){S.inks.forEach(function(i){if(i.id===id)i.pr=parseFloat(v)||0});render()}
function updCon(id,f,v){S.cons.forEach(function(c){if(c.id===id)c[f]=parseFloat(v)||0});render()}
function catUpd(i,f,v){S.cat[i][f]=v;savePrices();render()}
function catUpdP(i,t,v){S.cat[i].p[t]=pn(v);savePrices();render()}
function catDel(i){S.cat.splice(i,1);if(S.sC>=S.cat.length)S.sC=Math.max(0,S.cat.length-1);S.catEdit=null;savePrices();render()}
var _newType="tshirt",_newGen="unisex";
function selNewType(el,t){_newType=t;var btns=el.parentNode.querySelectorAll("button");btns.forEach(function(b){var on=b.getAttribute("data-type")===t;b.style.borderColor=on?"rgba(108,92,231,.5)":"rgba(255,255,255,.08)";b.style.background=on?"rgba(108,92,231,.15)":"rgba(255,255,255,.03)";b.style.color=on?"#A855F7":"rgba(255,255,255,.4)"})}
function selNewGen(el,g){_newGen=g;var btns=el.parentNode.querySelectorAll("button");btns.forEach(function(b){var on=b.getAttribute("data-gen")===g;b.style.borderColor=on?"rgba(108,92,231,.5)":"rgba(255,255,255,.08)";b.style.background=on?"rgba(108,92,231,.15)":"rgba(255,255,255,.03)";b.style.color=on?"#A855F7":"rgba(255,255,255,.4)"})}
function catAddSave(){
  var name=document.getElementById("newName").value.trim();
  if(!name){alert("Inserisci il nome");return}
  var p1=pn(document.getElementById("newP1").value);
  var p10=pn(document.getElementById("newP10").value)||p1;
  var p50=pn(document.getElementById("newP50").value)||p10;
  var p500=pn(document.getElementById("newP500").value)||p50;
  S.cat.push({id:uid(),name:name,color:document.getElementById("newColor").value.trim(),sizes:document.getElementById("newSizes").value.trim(),src:document.getElementById("newSrc").value.trim()||"Manuale",type:_newType,gen:_newGen,disc:0,discType:"%",p:{"1+":p1,"10+":p10,"50+":p50,"500+":p500}});
  S.catAdd=false;_newType="tshirt";_newGen="unisex";render();
}

render();
</script>
</body>
</html>
